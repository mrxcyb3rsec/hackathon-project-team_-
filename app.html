<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>App Risk Analysis</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .title {
            font-size: 28px;
            font-weight: bold;
        }

        .btn-group button {
            margin-right: 10px;
        }

        canvas {
            margin-top: 20px;
        }

        .safe {
            color: #22c55e;
        }

        .danger {
            color: #ef4444;
        }

        .back-btn {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<button class="btn btn-light back-btn" onclick="goBack()">⬅ Back</button>

<div class="card">
    <div class="title" id="appName">App</div>
    <p id="statusText" class="safe">Loading...</p>

    <!-- Timeline Buttons -->
    <div class="btn-group mt-3">
        <button class="btn btn-outline-light" onclick="loadHistory('day')">Day</button>
        <button class="btn btn-outline-light" onclick="loadHistory('3days')">3 Days</button>
        <button class="btn btn-outline-light" onclick="loadHistory('week')">Week</button>
        <button class="btn btn-outline-light" onclick="loadHistory('month')">Month</button>
    </div>

    <!-- Chart -->
    <canvas id="riskChart"></canvas>
</div>

<script>
let chart;

// ✅ SAFE URL PARSE
const pathParts = window.location.pathname.split("/").filter(Boolean);
const appName = decodeURIComponent(pathParts[1] || "Unknown");

document.getElementById("appName").innerText = appName;

// BACK BUTTON
function goBack() {
    window.location.href = "/";
}

// LOAD DATA
async function loadHistory(range="day") {
    try {
        // 🔥 ensure backend generates data
        await fetch("/data");

        const res = await fetch(`/app/${appName}/history/${range}`);
        const data = await res.json();

        if (!data.history || data.history.length === 0) {
            document.getElementById("statusText").innerText = "No data yet...";
            return;
        }

        const labels = data.history.map(h => 
            new Date(h.time).toLocaleTimeString()
        );

        const values = data.history.map(h => h.risk);

        updateStatus(values);

        if (chart) chart.destroy();

        chart = new Chart(document.getElementById("riskChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Risk %",
                    data: values,
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        min: 0,
                        max: 100
                    }
                }
            }
        });

    } catch (err) {
        console.error("Error:", err);
        document.getElementById("statusText").innerText = "Error loading data";
    }
}

// STATUS LOGIC
function updateStatus(values) {
    const latest = values[values.length - 1];
    const statusText = document.getElementById("statusText");

    // 🔐 Hushh AI special case
    if (appName === "Hushh AI") {
        statusText.innerText = "Trusted App - Always Safe";
        statusText.className = "safe";
        return;
    }

    if (latest < 50) {
        statusText.innerText = "Safe";
        statusText.className = "safe";
    } else if (latest < 80) {
        statusText.innerText = "Warning";
        statusText.className = "safe";
    } else {
        statusText.innerText = "High Risk";
        statusText.className = "danger";
    }
}

// AUTO REFRESH
setInterval(() => {
    loadHistory("day");
}, 3000);

// INITIAL LOAD
loadHistory();
</script>

</body>
</html>
