<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Intelligence System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-white" id="body">

<div class="container py-4">

    <!-- 🔵 TITLE -->
    <h2 class="text-center mb-4">🧠 Trust Intelligence System</h2>

    <!-- 🟢 TRUST + RISK -->
    <div class="card text-center mb-4 bg-secondary">
        <div class="card-body">
            <h4>Trust Score</h4>
            <h1 id="score">0%</h1>

            <h5 class="mt-3">Risk Score</h5>
            <h2 id="risk">0%</h2>

            <p>Status: <span id="status">Checking...</span></p>
        </div>
    </div>

    <!-- ⚠️ ALERTS -->
    <div class="mb-4">
        <h4>⚠️ Alerts</h4>
        <div id="alerts"></div>
    </div>

    <!-- 🧠 AI EXPLANATION -->
    <div class="mb-4">
        <h4>🧠 AI Explanation</h4>
        <ul id="reasons" class="list-group"></ul>
    </div>

    <!-- ⚡ SYSTEM ACTION -->
    <div class="mb-4">
        <h4>⚡ System Action</h4>
        <div id="action" class="alert alert-info">Waiting...</div>
    </div>

    <!-- 📱 ACTIVE APPS -->
    <div class="mb-4">
        <h4>📱 Active Permissions & Risk Graphs</h4>
        <div id="apps" class="row"></div>
    </div>

    <!-- 🎭 SIMULATION -->
    <div class="text-center mb-4">
        <button class="btn btn-danger m-2" onclick="simulate()">🎭 Run Attack Simulation</button>
        <button class="btn btn-success m-2" onclick="resetSystem()">♻️ Reset</button>
    </div>

    <!-- 🤖 AI CHAT -->
    <div class="card bg-secondary p-3">
        <h4>🤖 AI Assistant</h4>
        <input id="question" class="form-control mb-2" placeholder="Ask something..." />
        <button class="btn btn-light" onclick="askAI()">Ask</button>
        <p id="answer" class="mt-2"></p>
    </div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
